name: CI

# Tier A checks only -- these need no Altium and gate every push/PR.
# (The live integration tests in server/tests/test_altium_script.py require
#  Altium Designer and are run manually on a developer machine.)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --quiet pytest jsonschema
      - name: Run Tier A tests (schemas, fixtures, fab profiles)
        run: python -m pytest server/tests/test_schemas.py server/tests/test_fab_profiles.py server/tests/test_bom.py server/tests/test_activity.py -v
